services:
  # Thoughtbox MCP server (internal only)
  thoughtbox:
    build:
      context: .
      dockerfile: Dockerfile
    image: thoughtbox:local
    expose:
      - "1731"
    ports:
      - "1729:1729"  # Observatory still public
      - "1731:1731"  # MCP server
    environment:
      NODE_ENV: production
      PORT: 1731
      THOUGHTBOX_TRANSPORT: http
      THOUGHTBOX_DATA_DIR: /data/thoughtbox
      THOUGHTBOX_OBSERVATORY_ENABLED: "true"
      THOUGHTBOX_OBSERVATORY_PORT: 1729
      THOUGHTBOX_OBSERVATORY_CORS: "*"
    volumes:
      - ./.thoughtbox:/data/thoughtbox
    networks:
      - mcp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:1731/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  mcp-network:
    driver: bridge

volumes:
  thoughtbox-data:
