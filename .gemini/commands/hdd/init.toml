prompt = """
# HDD Initialization: Create Session State

**Purpose**: Initialize a new HDD session without relying on any external task
tracker.

Every HDD session must have durable local state before research or
implementation begins. The source of truth for HDD progress is
`.hdd/state.json`, plus the staging ADR and spec artifacts created during the
workflow.

Task tracking is optional and must use only the tracker explicitly selected by
the user for the current work. Do not use an unverified tracker CLI or legacy
issue remotes.

## Command: `/hdd:init`

### Usage

```bash
/hdd:init [adr-number] [title]
```

### What This Command Does

1. Confirm the current branch matches the unit of work.
2. Check whether `.hdd/state.json` already exists for this ADR.
3. If a user-selected tracker is in scope, record its issue/reference ID in the
   state file. If tracker writes are unavailable, continue with local HDD state
   and note that in the handoff.
4. Create `.hdd/state.json` with the requested phases and artifact paths.
5. Show the session dashboard and begin Phase 1.
"""
